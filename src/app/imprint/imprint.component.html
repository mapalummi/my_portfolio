<div class="imprint-container">
  <app-header *ngIf="!isMobileMenuOpen"></app-header>

  <app-mobile-header (toggleMenu)="toggleMobileMenu()"></app-mobile-header>

  <app-mobile-navbar
    *ngIf="isMobileMenuOpen"
    (closeMenu)="isMobileMenuOpen = false"
  ></app-mobile-navbar>

  <div class="main-content">
    <div class="content-card">
      <h1 id="impressum-heading">{{ "imprint.headline-one" | translate }}</h1>
      <address>
        <p>
          Marc-Antonio Palummieri<br />
          c/o Online-Impressum #7645<br />
          Europaring 90<br />
          53757 Sankt Augustin
        </p>
        <p>
          E-Mail:
          <a
            href="mailto:info&#64;marcopalummieri.de"
            aria-label="E-Mail an Marco Palummieri senden"
          >
            info&#64;marcopalummieri.de
          </a><br />
          Telefon:
          <a href="tel:+4915679788183" aria-label="Telefonnummer anrufen"
            >015679788183</a
          >
        </p>
      </address>
      <p>
        <small>
          Icons:
          <a
            href="https://icons8.de/icons"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="Icons8 Website in neuem Tab öffnen"
          >
            https://icons8.de/icons
          </a>
        </small>
        <br />
        <small>
          {{ "imprint.source" | translate }}:
          <a
            href="https://www.e-recht24.de"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="E-Recht24 Website in neuem Tab öffnen"
          >
            https://www.e-recht24.de
          </a>
        </small>
      </p>
      <nav class="back-button-container" aria-label="Seitennavigation">
        <button
          class="back-button"
          (click)="goBack()"
          type="button"
          aria-label="Zur vorherigen Seite zurückkehren"
        >
          <span class="arrow" aria-hidden="true">←</span>
          {{ "imprint.button" | translate }}
        </button>
      </nav>
    </div>
  </div>
  <app-footer></app-footer>
</div>
